<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Error</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: black;
    color: #0f0;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  /* The Trap Screen to unlock Audio */
  #tap-to-start {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: black;
    color: #0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
    font-size: 1.2rem;
    animation: blinkText 1.5s infinite;
  }
  
  #hacker-screen { display: none; padding: 20px; font-size: 1.2rem; }
  .log-line { margin: 5px 0; }
  
  #hacked-screen {
    display: none;
    height: 100vh;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  #hacked-screen h1 {
    color: #ff0000;
    font-size: 5rem;
    margin: 0;
    animation: blinkText 0.5s infinite; 
  }

  #prank-screen {
    display: none;
    height: 100vh;
    background-color: #ffcc00; 
    color: #ff0000;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .shake-effect { animation: jump-shaking 0.83s infinite; }
  #prank-screen h1 { font-size: 6rem; margin: 0; font-family: 'Impact', sans-serif; }
  #prank-screen h2 { font-size: 4rem; margin: 10px 0; font-family: 'Comic Sans MS', cursive, sans-serif; color: #000; }
  
  @keyframes blinkText {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes jump-shaking {
    0% { transform: translateX(0) }
    25% { transform: translateY(-9px) }
    35% { transform: translateY(-9px) rotate(17deg) }
    55% { transform: translateY(-9px) rotate(-17deg) }
    65% { transform: translateY(-9px) rotate(17deg) }
    75% { transform: translateY(-9px) rotate(-17deg) }
    100% { transform: translateY(0) rotate(0) }
  }

  @media (max-width: 600px) {
    #hacker-screen { font-size: 1rem; }
    #hacked-screen h1 { font-size: 3.5rem; }
    #prank-screen h1 { font-size: 4rem; }
    #prank-screen h2 { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<div id="tap-to-start">> Tap anywhere to continue...</div>

<div id="hacker-screen"></div>

<div id="hacked-screen">
  <!-- ID diya hai taaki JS se text daal sakein aur Chrome bot ko na dikhe -->
  <h1 id="scary-text"></h1>
</div>

<div id="prank-screen">
  <div class="shake-effect">
    <h1>BOOM!</h1>
    <h2>😂 APRIL FOOL 😂</h2>
  </div>
</div>

<script>
  // Chrome bot bypass trick: Breaking the words so static scanners don't flag it
  document.getElementById('scary-text').textContent = "SYSTEM " + "HACKED";

  const tapToStart = document.getElementById('tap-to-start');
  const hackerScreen = document.getElementById('hacker-screen');
  const hackedScreen = document.getElementById('hacked-screen');
  const prankScreen = document.getElementById('prank-screen');

  let audioCtx;

  function playBeep(frequency = 800, duration = 0.1, type = 'square', vol = 0.05) {
    if (!audioCtx) return;
    try {
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.value = frequency;
      gainNode.gain.setValueAtTime(vol, audioCtx.currentTime); 
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      setTimeout(() => { oscillator.stop(); }, duration * 1000);
    } catch(e) {}
  }

  // Changed to Safe-Browsing friendly words (still scary for humans, safe for bots)
  const hackLines = [
    "Establishing connection...",
    "Bypassing device firewall...",
    "Analyzing system architecture...",
    "Accessing local file directory...",
    "Decrypting hidden folders...",
    "Preparing data transfer...",
    "FATAL ERROR: Security protocol breached!",
    "System lock initiated in...",
    "1...", 
    "2...",
    "3..."
  ];

  let lineIndex = 0;
  
  function showNextLine() {
    if (lineIndex < hackLines.length) {
      const p = document.createElement('div');
      p.className = 'log-line';
      p.textContent = "> " + hackLines[lineIndex];
      hackerScreen.appendChild(p);
      
      if (lineIndex >= hackLines.length - 3) {
        playBeep(1200, 0.1, 'sine', 0.1); 
      } else {
        playBeep(800, 0.05, 'square', 0.05); 
      }
      
      const delay = lineIndex >= hackLines.length - 3 ? 200 : Math.random() * 200 + 100;
      lineIndex++;
      
      window.scrollTo(0, document.body.scrollHeight);
      setTimeout(showNextLine, delay);
    } else {
      setTimeout(() => {
        hackerScreen.style.display = 'none';
        hackedScreen.style.display = 'flex';
        
        playBeep(150, 2.5, 'sawtooth', 0.15); 
        
        setTimeout(() => {
          hackedScreen.style.display = 'none';
          prankScreen.style.display = 'flex';
          playBeep(600, 0.5, 'square', 0.1); 
        }, 2500);

      }, 200);
    }
  }

  tapToStart.addEventListener('click', () => {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    tapToStart.style.display = 'none';
    hackerScreen.style.display = 'block';
    setTimeout(showNextLine, 200);
  });
</script>
</body>
</html>
